---
artifact: ${project.groupId}:${project.artifactId}:${project.version}
name: "Quarkus CXF WS-Security"
description: "Consume and produce web services with Web Services Security (WS-Security, WSS)"
metadata:
  keywords:
    - "cxf"
    - "jaxws"
    - "jax-ws"
    - "services"
    - "soap"
    - "ws"
    - "wss"
    - "ws-security"
  categories:
    - "integration"
  guide: "https://quarkiverse.github.io/quarkiverse-docs/quarkus-cxf/dev/reference/extensions/quarkus-cxf-rt-ws-security.html"
  status: "stable"
  integrates:
    - name: "Apache CXF"
      artifact: "org.apache.cxf:cxf-core"
      version: "${cxf.version}"
    - name: "Apache WSS4J"
      artifact: "org.apache.wss4j:wss4j-ws-security-common"
      version: "${wss4j.version}"
